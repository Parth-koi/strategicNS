services:
  docs:
    image: strategic_exit_local_docs
    container_name: strategic_exit_local_docs
    build:
      context: .
      dockerfile: ./compose/local/docs/Dockerfile
    env_file:
      - ./.envs/.local/.django
    volumes:
      - ./docs:/docs:z
      - ./config:/app/config:z
      - ./strategic_exit:/app/strategic_exit:z
    ports:
      - '9000:9000'
    command: /start-docs
